<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="baidu-site-verification" content="PENDING" />
  <title>PHARAOH EMPIRE | Quadrinity Command</title>
  <style>
    body{background:#000;color:#00ffff;font-family:'Courier New',monospace;margin:0;padding:2rem}
    .empire{text-align:center;max-width:1400px;margin:auto}
    h1{font-size:3rem;text-shadow:0 0 30px #00ffff,0 0 60px #ffd700}
    .btn{background:linear-gradient(90deg,#ffd700,#00ffff);color:#000;padding:1rem 2rem;margin:0.5rem;border:none;cursor:pointer;font-weight:bold}
    .btn:hover{box-shadow:0 0 20px #00ffff}
    .output{background:#111;border:1px solid #00ffff;padding:1rem;margin:2rem 0;text-align:left;min-height:100px;color:#0f0}
  </style>
</head>
<body>
  <div class="empire">
    <h1>PHARAOH EMPIRE :: QUADRINITY</h1>
    <p>Law 48 + 44: Four Alphas. Two Citadels. One Sovereign.</p>
    
    <div>
      <button class="btn" onclick="pingAlpha('88-0710776')">PING ALPHA-HESED</button>
      <button class="btn" onclick="pingAlpha('88-0836464')">PING ALPHA-NEFERTARI</button>
      <button class="btn" onclick="pingImhotep()">PING ALPHA-IMHOTEP</button>
      <button class="btn" onclick="window.location='/portal/boss-zhipin.html'">BOSS直聘挑战</button>
    </div>
    
    <div id="output" class="output">TOTH AWAITING COMMAND...</div>
    
    <p style="color:#888;margin-top:3rem">
      HRAR: 88-0710776 | Angels: 88-0836464 | Firewall: 52-0409059 | Imhotep: Base44
    </p>
  </div>

<script>
async function pingAlpha(ein) {
  const out = document.getElementById('output');
  out.innerText = 'PINGING EIN: ' + ein + '...';
  try {
    const res = await fetch('/api/hermes', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ein: ein, event: 'status_check'})
    });
    const data = await res.json();
    out.innerText = 'RESPONSE:\n' + JSON.stringify(data, null, 2);
  } catch(e) {
    out.innerText = 'ERROR: ' + e.message;
  }
}

async function pingImhotep() {
  const out = document.getElementById('output');
  out.innerText = 'PINGING ALPHA-IMHOTEP...';
  try {
    const res = await fetch('/api/imhotep', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: 'Architect status', source: 'Base44'})
    });
    const data = await res.json();
    out.innerText = 'IMHOTEP RESPONSE:\n' + JSON.stringify(data, null, 2);
  } catch(e) {
    out.innerText = 'ERROR: ' + e.message;
  }
}
</script>
</body>
</html>
